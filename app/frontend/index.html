<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local AI Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: #0d0d0d;
            color: #ececec;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .header {
            padding: 16px 20px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0d0d0d;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .clear-btn {
            background: #565869;
            border: none;
            color: #fff;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .clear-btn:hover {
            background: #656577;
        }

        .clear-btn:active {
            background: #464656;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            white-space: pre-wrap;
            line-height: 1.5;
        }

        .message.user .message-bubble {
            background: #10a37f;
            color: #fff;
            border-radius: 12px 4px 12px 12px;
        }

        .message.assistant .message-bubble {
            background: #343541;
            color: #ececec;
            border-radius: 4px 12px 12px 12px;
        }

        .message-time {
            font-size: 12px;
            color: #888;
            align-self: flex-end;
            margin-top: 4px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 12px 16px;
            background: #343541;
            border-radius: 12px;
            width: fit-content;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #888;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.3;
            }
            30% {
                opacity: 1;
            }
        }

        .input-area {
            padding: 16px 20px;
            border-top: 1px solid #333;
            background: #0d0d0d;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        #prompt-input {
            flex: 1;
            background: #343541;
            border: 1px solid #565869;
            color: #ececec;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            resize: none;
            max-height: 120px;
            min-height: 48px;
            transition: border-color 0.2s;
        }

        #prompt-input:focus {
            outline: none;
            border-color: #10a37f;
        }

        #prompt-input::placeholder {
            color: #888;
        }

        .send-btn {
            background: #10a37f;
            border: none;
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 48px;
            height: 48px;
        }

        .send-btn:hover:not(:disabled) {
            background: #0d8560;
        }

        .send-btn:active:not(:disabled) {
            background: #0a6d4a;
        }

        .send-btn:disabled {
            background: #565869;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .error-message {
            background: #6b4c4c;
            color: #ffc9c9;
            padding: 12px 16px;
            border-radius: 8px;
            border-left: 4px solid #ff6b6b;
        }

        /* Scrollbar styling */
        .messages-container::-webkit-scrollbar {
            width: 8px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: #565869;
            border-radius: 4px;
        }

        .messages-container::-webkit-scrollbar-thumb:hover {
            background: #707079;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #888;
            text-align: center;
            gap: 12px;
        }

        .empty-state h2 {
            font-size: 24px;
            font-weight: 600;
            color: #ececec;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Local AI Chat</h1>
            <button class="clear-btn" onclick="clearChat()">Clear Chat</button>
        </div>

        <div class="messages-container" id="messages-container">
            <div class="empty-state">
                <h2>Start a conversation</h2>
                <p>Ask me anything...</p>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea
                    id="prompt-input"
                    placeholder="Type your message and press Enter or click Send..."
                    rows="1"
                ></textarea>
                <button class="send-btn" id="send-btn" onclick="sendMessage()">
                    <span id="send-icon">→</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://192.168.178.69:8000";
        const messages = [];
        let isLoading = false;

        const messagesContainer = document.getElementById("messages-container");
        const promptInput = document.getElementById("prompt-input");
        const sendBtn = document.getElementById("send-btn");

        // Auto-resize textarea
        promptInput.addEventListener("input", () => {
            promptInput.style.height = "auto";
            promptInput.style.height = Math.min(promptInput.scrollHeight, 120) + "px";
        });

        // Send on Enter (but allow Shift+Enter for new line)
        promptInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        async function sendMessage() {
            const prompt = promptInput.value.trim();

            if (!prompt || isLoading) return;

            // Add user message
            const userMessage = {
                role: "user",
                content: prompt,
                timestamp: new Date()
            };
            messages.push(userMessage);
            renderMessage(userMessage);

            // Clear input
            promptInput.value = "";
            promptInput.style.height = "auto";

            // Show typing indicator
            isLoading = true;
            sendBtn.disabled = true;
            const typingId = showTypingIndicator();

            try {
                // Call API
                const response = await fetch(`${API_BASE}/chat`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        prompt: prompt,
                        model: "llama3.2:3b"
                    })
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status} ${response.statusText}`);
                }

                const data = await response.json();

                // Remove typing indicator
                document.getElementById(typingId).remove();

                // Add assistant message
                const assistantMessage = {
                    role: "assistant",
                    content: data.response || "No response received",
                    timestamp: new Date()
                };
                messages.push(assistantMessage);
                renderMessage(assistantMessage);

            } catch (error) {
                console.error("Error:", error);
                document.getElementById(typingId).remove();

                // Show error message
                const errorMessage = {
                    role: "error",
                    content: `Error: ${error.message}. Make sure the API is running at ${API_BASE}`,
                    timestamp: new Date()
                };
                messages.push(errorMessage);
                renderMessage(errorMessage);
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
                promptInput.focus();
            }
        }

        function showTypingIndicator() {
            const id = `typing-${Date.now()}`;
            const messageDiv = document.createElement("div");
            messageDiv.className = "message assistant";
            messageDiv.innerHTML = `
                <div id="${id}" class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            messagesContainer.appendChild(messageDiv);
            scrollToBottom();
            return id;
        }

        function renderMessage(message) {
            // Clear empty state if this is the first real message
            if (messages.length === 1) {
                messagesContainer.innerHTML = "";
            }

            const messageDiv = document.createElement("div");
            messageDiv.className = `message ${message.role}`;

            if (message.role === "error") {
                messageDiv.innerHTML = `<div class="error-message">${escapeHtml(message.content)}</div>`;
            } else {
                const time = message.timestamp.toLocaleTimeString("en-US", {
                    hour: "2-digit",
                    minute: "2-digit"
                });

                messageDiv.innerHTML = `
                    <div style="display: flex; flex-direction: column; gap: 4px;">
                        <div class="message-bubble">${formatMessageContent(message.content)}</div>
                        <div class="message-time">${time}</div>
                    </div>
                `;
            }

            messagesContainer.appendChild(messageDiv);
            scrollToBottom();
        }

        function formatMessageContent(content) {
            // Escape HTML and preserve line breaks, then apply basic formatting
            let formatted = escapeHtml(content);

            // Bold text: **text** -> <strong>text</strong>
            formatted = formatted.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");

            // Italic text: *text* -> <em>text</em>
            formatted = formatted.replace(/\*(.*?)\*/g, "<em>$1</em>");

            // Code blocks: `text` -> <code>text</code>
            formatted = formatted.replace(/`(.*?)`/g, "<code style='background: #565869; padding: 2px 6px; border-radius: 4px; font-family: monospace;'>$1</code>");

            return formatted;
        }

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        function scrollToBottom() {
            setTimeout(() => {
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }, 0);
        }

        function clearChat() {
            if (confirm("Clear all messages?")) {
                messages.length = 0;
                messagesContainer.innerHTML = `
                    <div class="empty-state">
                        <h2>Start a conversation</h2>
                        <p>Ask me anything...</p>
                    </div>
                `;
                promptInput.focus();
            }
        }

        // Focus input on load
        promptInput.focus();
    </script>
</body>
</html>
