<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Workspace Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #0d0d0d;
            color: #ececec;
            height: 100vh;
            overflow: hidden;
        }

        .dashboard {
            display: flex;
            height: 100vh;
            gap: 0;
        }

        /* ============ SIDEBAR ============ */
        .sidebar {
            width: 300px;
            background: #1a1a1a;
            border-right: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .sidebar-header h1 {
            font-size: 18px;
            font-weight: 600;
            flex: 1;
        }

        .new-chat-btn {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: #10a37f;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .new-chat-btn:hover {
            background: #0d8a6f;
            transform: scale(1.05);
        }

        .sidebar-section {
            flex: 0 0 auto;
            border-bottom: 1px solid #2a2a2a;
        }

        .sidebar-section-title {
            padding: 12px 16px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: #999;
            letter-spacing: 0.5px;
        }

        .sessions-list {
            padding: 8px 8px;
            flex: 1;
            overflow-y: auto;
        }

        .session-item {
            padding: 12px 12px;
            margin: 4px 0;
            background: #2a2a2a;
            border: 1px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            group: true;
        }

        .session-item:hover {
            background: #333;
            border-color: #10a37f;
        }

        .session-item.active {
            background: #10a37f;
            color: #0d0d0d;
            font-weight: 600;
        }

        .session-item-name {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session-item-delete {
            opacity: 0;
            width: 24px;
            height: 24px;
            background: none;
            border: none;
            color: inherit;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }

        .session-item:hover .session-item-delete {
            opacity: 1;
        }

        .session-item-delete:hover {
            color: #ff6b6b;
        }

        .documents-list {
            padding: 8px 8px;
            max-height: 200px;
            overflow-y: auto;
        }

        .doc-item {
            padding: 8px 12px;
            margin: 4px 0;
            background: #2a2a2a;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .doc-item:hover {
            background: #333;
            border-color: #10a37f;
        }

        .prompts-list {
            padding: 8px 8px;
            max-height: 200px;
            overflow-y: auto;
        }

        .prompt-item {
            padding: 8px 12px;
            margin: 4px 0;
            background: #2a2a2a;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .prompt-item:hover {
            background: #333;
            border-color: #10a37f;
        }

        /* ============ MAIN CHAT AREA ============ */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0d0d0d;
        }

        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a1a1a;
        }

        .chat-header-title {
            font-size: 18px;
            font-weight: 600;
        }

        .chat-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .toggle-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #b0b0b0;
            cursor: pointer;
            user-select: none;
        }

        .toggle-label input {
            width: 16px;
            height: 16px;
            accent-color: #4a9eff;
        }

        .prompt-select {
            min-width: 180px;
            padding: 8px 10px;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            background: #0d0d0d;
            color: #ececec;
            font-size: 13px;
        }

        .prompt-form {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
        }

        .prompt-form input,
        .prompt-form textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            background: #0d0d0d;
            color: #ececec;
            font-size: 13px;
            font-family: inherit;
        }

        .prompt-form textarea {
            min-height: 80px;
            resize: vertical;
        }

        .prompt-save-btn,
        .prompt-action-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            background: #4a9eff;
            color: white;
            font-size: 12px;
            cursor: pointer;
        }

        .prompt-action-btn {
            background: transparent;
            color: #b0b0b0;
            border: 1px solid #2a2a2a;
            padding: 4px 8px;
        }

        .prompt-list-item-actions {
            display: flex;
            gap: 6px;
        }

        .clear-btn {
            padding: 8px 16px;
            background: #333;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            color: #ececec;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .clear-btn:hover {
            background: #ff6b6b;
            border-color: #ff6b6b;
            color: #0d0d0d;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message-group {
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease-out;
        }

        .message-group.user {
            justify-content: flex-end;
        }

        .message-group.assistant {
            justify-content: flex-start;
        }

        .message {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.user {
            background: #10a37f;
            color: #0d0d0d;
            font-weight: 500;
        }

        .message.assistant {
            background: #343541;
            color: #ececec;
        }

        .message-timestamp {
            font-size: 11px;
            color: #999;
            text-align: center;
            width: 100%;
            margin: 8px 0;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 12px 16px;
            background: #343541;
            border-radius: 12px;
            width: fit-content;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10a37f;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.5;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-10px);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .document-context {
            background: #2a2a2a;
            border-left: 3px solid #10a37f;
            padding: 12px;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .document-context-title {
            font-weight: 600;
            color: #10a37f;
            margin-bottom: 4px;
        }

        .document-context-text {
            color: #bbb;
        }

        /* ============ INPUT AREA ============ */
        .input-area {
            padding: 16px 20px;
            border-top: 1px solid #2a2a2a;
            background: #1a1a1a;
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 8px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            background: #2a2a2a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #ececec;
            font-family: inherit;
            font-size: 14px;
            resize: none;
            max-height: 150px;
            transition: all 0.2s;
        }

        .chat-input:focus {
            outline: none;
            border-color: #10a37f;
            background: #333;
        }

        .chat-input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: #10a37f;
            border: none;
            color: #0d0d0d;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-weight: bold;
        }

        .send-btn:hover:not(:disabled) {
            background: #0d8a6f;
            transform: scale(1.05);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ============ RIGHT PANEL ============ */
        .right-panel {
            width: 350px;
            background: #1a1a1a;
            border-left: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            z-index: 999;
        }

        .panel-header {
            padding: 16px;
            border-bottom: 1px solid #2a2a2a;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            color: #999;
            letter-spacing: 0.5px;
        }

        .panel-section {
            padding: 16px;
            border-bottom: 1px solid #2a2a2a;
        }

        .section-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #10a37f;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .upload-zone {
            border: 2px dashed #10a37f;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
        }

        .upload-zone:hover {
            background: rgba(16, 163, 127, 0.1);
            border-color: #0d8a6f;
        }

        .upload-zone.drag-over {
            background: rgba(16, 163, 127, 0.2);
            border-color: #0d8a6f;
        }

        .upload-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .upload-text {
            font-size: 12px;
            color: #10a37f;
            margin-bottom: 8px;
        }

        .upload-hint {
            font-size: 11px;
            color: #666;
        }

        .file-input {
            display: none;
        }

        .documents-section {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
        }

        .doc-list-item {
            padding: 8px;
            background: #2a2a2a;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .doc-list-item:hover {
            background: #333;
            border-color: #10a37f;
        }

        .doc-list-item-name {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 8px;
        }

        .doc-list-item-btn {
            background: none;
            border: none;
            color: #10a37f;
            cursor: pointer;
            font-size: 12px;
            padding: 4px 8px;
            transition: all 0.2s;
        }

        .doc-list-item-btn:hover {
            transform: scale(1.1);
        }

        .prompts-section {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
        }

        .prompt-list-item {
            padding: 8px;
            background: #2a2a2a;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 12px;
            word-break: break-word;
        }

        .prompt-list-item:hover {
            background: #333;
            border-color: #10a37f;
        }

        .prompt-list-item-name {
            font-weight: 600;
            color: #10a37f;
            margin-bottom: 4px;
        }

        .prompt-list-item-content {
            font-size: 11px;
            color: #aaa;
            line-height: 1.3;
        }

        /* ============ EMPTY STATE ============ */
        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #666;
            text-align: center;
        }

        .empty-state-content {
            max-width: 300px;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 14px;
            line-height: 1.6;
        }

        /* ============ LOADING STATE ============ */
        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid #333;
            border-top-color: #10a37f;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ============ SCROLLBAR ============ */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #10a37f;
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 1400px) {
            .sidebar {
                width: 250px;
            }

            .right-panel {
                width: 300px;
            }

            .message {
                max-width: 80%;
            }
        }

        @media (max-width: 1024px) {
            .sidebar {
                position: absolute;
                height: 100%;
                left: -250px;
                width: 250px;
                z-index: 2000;
                transition: left 0.3s ease;
            }

            .sidebar.show {
                left: 0;
            }

            .right-panel {
                display: none;
            }

            .message {
                max-width: 85%;
            }
        }

        .error-message {
            background: #ff6b6b;
            color: #0d0d0d;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 14px;
            animation: slideIn 0.3s ease-out;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- LEFT SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>AI Workspace</h1>
                <button class="new-chat-btn" title="New Chat">+</button>
            </div>

            <!-- Chat Sessions -->
            <div class="sidebar-section">
                <div class="sidebar-section-title">Conversations</div>
                <div class="sessions-list"></div>
            </div>

            <!-- Documents -->
            <div class="sidebar-section">
                <div class="sidebar-section-title">Documents</div>
                <div class="documents-list"></div>
            </div>

            <!-- Prompts -->
            <div class="sidebar-section">
                <div class="sidebar-section-title">Quick Prompts</div>
                <div class="prompts-list"></div>
            </div>
        </aside>

        <!-- MAIN CHAT AREA -->
        <main class="chat-area">
            <div class="chat-header">
                <div class="chat-header-title">Chat</div>
                <div class="chat-controls">
                    <label class="toggle-label" title="Include uploaded documents in responses">
                        <input type="checkbox" class="use-documents-toggle" checked />
                        Use Documents
                    </label>
                    <select class="prompt-select" title="Apply a saved prompt template">
                        <option value="">No prompt template</option>
                    </select>
                    <button class="clear-btn">Clear Chat</button>
                </div>
            </div>
            <div class="messages-container"></div>
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea class="chat-input" placeholder="Ask me anything... (Enter to send, Shift+Enter for new line)" rows="1"></textarea>
                    <button class="send-btn">↑</button>
                </div>
            </div>
        </main>

        <!-- RIGHT PANEL -->
        <aside class="right-panel">
            <div class="panel-header">Tools & Resources</div>

            <!-- Document Upload -->
            <div class="panel-section">
                <div class="section-title">📎 Documents</div>
                <div class="upload-zone">
                    <div class="upload-icon">📤</div>
                    <div class="upload-text">Drag files here</div>
                    <div class="upload-hint">or click to browse</div>
                </div>
                <input type="file" class="file-input" accept=".txt,.pdf,.docx" />
                <div class="documents-section"></div>
            </div>

            <!-- Prompt Library -->
            <div class="panel-section">
                <div class="section-title">Prompt Library</div>
                <div class="prompt-form">
                    <input type="text" class="prompt-name-input" placeholder="Prompt name" />
                    <textarea class="prompt-content-input" placeholder="Template content. Use {input} for the user message."></textarea>
                    <button class="prompt-save-btn" type="button">Save Prompt</button>
                </div>
                <div class="prompts-section"></div>
            </div>
        </aside>
    </div>

    <script>
        // ============ API BASE URL ============
        // Same-origin when served by FastAPI (localhost, LAN, or Cloudflare tunnel).
        // Override via ?api_base=... query param or localStorage.API_BASE.
        function resolveApiBase() {
            const params = new URLSearchParams(window.location.search);
            const override = params.get("api_base") || localStorage.getItem("API_BASE");
            if (override) {
                return override.replace(/\/$/, "");
            }
            if (window.location.protocol.startsWith("http")) {
                return window.location.origin;
            }
            return "http://localhost:8000";
        }

        // ============ STATE MANAGEMENT ============
        const state = {
            sessions: {},
            currentSessionId: "default",
            documents: [],
            prompts: [],
            selectedDocumentId: null,
            isLoading: false,
            API_BASE: resolveApiBase()
        };

        // Initialize state with default session
        state.sessions["default"] = {
            id: "default",
            name: "New Chat",
            messages: [],
            createdAt: new Date().toLocaleString(),
            useDocuments: true,
            selectedPromptId: null
        };

        // ============ DOM ELEMENTS ============
        const DOM = {
            sessionsList: document.querySelector(".sessions-list"),
            documentsList: document.querySelector(".documents-list"),
            promptsList: document.querySelector(".prompts-list"),
            messagesContainer: document.querySelector(".messages-container"),
            chatInput: document.querySelector(".chat-input"),
            sendBtn: document.querySelector(".send-btn"),
            clearBtn: document.querySelector(".clear-btn"),
            uploadZone: document.querySelector(".upload-zone"),
            fileInput: document.querySelector(".file-input"),
            docListContainer: document.querySelector(".documents-section"),
            promptListContainer: document.querySelector(".prompts-section"),
            newChatBtn: document.querySelector(".new-chat-btn"),
            useDocumentsToggle: document.querySelector(".use-documents-toggle"),
            promptSelect: document.querySelector(".prompt-select"),
            promptNameInput: document.querySelector(".prompt-name-input"),
            promptContentInput: document.querySelector(".prompt-content-input"),
            promptSaveBtn: document.querySelector(".prompt-save-btn")
        };

        // ============ INITIALIZATION ============
        async function init() {
            setupEventListeners();
            renderSessions();
            renderCurrentSession();
            await loadDocuments();
            await loadPrompts();
            renderDocuments();
            renderPrompts();
            syncChatControls();
        }

        function setupEventListeners() {
            // Chat input
            DOM.sendBtn.addEventListener("click", sendMessage);
            DOM.chatInput.addEventListener("keydown", (e) => {
                if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            DOM.chatInput.addEventListener("input", autoResizeTextarea);

            // Clear chat
            DOM.clearBtn.addEventListener("click", clearCurrentSession);

            // New chat
            DOM.newChatBtn.addEventListener("click", createNewSession);

            // RAG toggle (per session)
            DOM.useDocumentsToggle.addEventListener("change", () => {
                const session = state.sessions[state.currentSessionId];
                if (session) {
                    session.useDocuments = DOM.useDocumentsToggle.checked;
                }
            });

            // Prompt template selector (per session)
            DOM.promptSelect.addEventListener("change", () => {
                const session = state.sessions[state.currentSessionId];
                if (session) {
                    session.selectedPromptId = DOM.promptSelect.value || null;
                }
            });

            DOM.promptSaveBtn.addEventListener("click", savePrompt);

            // Document upload
            DOM.uploadZone.addEventListener("click", () => DOM.fileInput.click());
            DOM.uploadZone.addEventListener("dragover", (e) => {
                e.preventDefault();
                DOM.uploadZone.classList.add("drag-over");
            });
            DOM.uploadZone.addEventListener("dragleave", () => {
                DOM.uploadZone.classList.remove("drag-over");
            });
            DOM.uploadZone.addEventListener("drop", (e) => {
                e.preventDefault();
                DOM.uploadZone.classList.remove("drag-over");
                const files = e.dataTransfer.files;
                if (files.length > 0) uploadFile(files[0]);
            });
            DOM.fileInput.addEventListener("change", (e) => {
                if (e.target.files.length > 0) uploadFile(e.target.files[0]);
            });
        }

        function autoResizeTextarea() {
            DOM.chatInput.style.height = "auto";
            DOM.chatInput.style.height = Math.min(DOM.chatInput.scrollHeight, 150) + "px";
        }

        // ============ SESSIONS ============
        function renderSessions() {
            DOM.sessionsList.innerHTML = "";
            Object.values(state.sessions).forEach(session => {
                const div = document.createElement("div");
                div.className = `session-item ${session.id === state.currentSessionId ? "active" : ""}`;
                div.innerHTML = `
                    <span class="session-item-name">${escapeHtml(session.name)}</span>
                    <button class="session-item-delete" data-id="${session.id}">×</button>
                `;
                
                div.addEventListener("click", (e) => {
                    if (!e.target.classList.contains("session-item-delete")) {
                        switchSession(session.id);
                    }
                });
                
                div.querySelector(".session-item-delete").addEventListener("click", (e) => {
                    e.stopPropagation();
                    deleteSession(session.id);
                });
                
                DOM.sessionsList.appendChild(div);
            });
        }

        function createNewSession() {
            const id = `session_${Date.now()}`;
            const name = `Chat ${Object.keys(state.sessions).length}`;
            state.sessions[id] = {
                id,
                name,
                messages: [],
                createdAt: new Date().toLocaleString(),
                useDocuments: true,
                selectedPromptId: null
            };
            switchSession(id);
        }

        function switchSession(sessionId) {
            state.currentSessionId = sessionId;
            state.selectedDocumentId = null;
            renderSessions();
            syncChatControls();
            renderCurrentSession();
        }

        function getCurrentSession() {
            return state.sessions[state.currentSessionId];
        }

        function syncChatControls() {
            const session = getCurrentSession();
            if (!session) return;

            DOM.useDocumentsToggle.checked = session.useDocuments !== false;
            DOM.promptSelect.value = session.selectedPromptId || "";
        }

        function deleteSession(sessionId) {
            if (Object.keys(state.sessions).length <= 1) {
                alert("Cannot delete the last session");
                return;
            }
            delete state.sessions[sessionId];
            if (state.currentSessionId === sessionId) {
                state.currentSessionId = Object.keys(state.sessions)[0];
            }
            renderSessions();
            renderCurrentSession();
        }

        function clearCurrentSession() {
            if (confirm("Clear all messages in this chat?")) {
                state.sessions[state.currentSessionId].messages = [];
                state.selectedDocumentId = null;
                renderCurrentSession();
            }
        }

        // ============ MESSAGES ============
        function renderCurrentSession() {
            const messages = state.sessions[state.currentSessionId].messages;
            DOM.messagesContainer.innerHTML = "";

            if (messages.length === 0) {
                DOM.messagesContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-content">
                            <div class="empty-state-icon">💬</div>
                            <div class="empty-state-text">
                                Start a conversation or select a document to analyze
                            </div>
                        </div>
                    </div>
                `;
                return;
            }

            messages.forEach(msg => renderMessage(msg));
            DOM.messagesContainer.scrollTop = DOM.messagesContainer.scrollHeight;
        }

        function renderMessage(msg) {
            const msgGroup = document.createElement("div");
            msgGroup.className = `message-group ${msg.role}`;

            const timestamp = new Date(msg.timestamp).toLocaleTimeString([], {
                hour: "2-digit",
                minute: "2-digit"
            });

            const messageDiv = document.createElement("div");
            messageDiv.className = `message ${msg.role}`;
            messageDiv.textContent = msg.content;

            msgGroup.appendChild(messageDiv);

            const timeDiv = document.createElement("div");
            timeDiv.className = "message-timestamp";
            timeDiv.textContent = timestamp;
            
            DOM.messagesContainer.appendChild(msgGroup);
            DOM.messagesContainer.appendChild(timeDiv);
        }

        function showTypingIndicator() {
            const typingDiv = document.createElement("div");
            typingDiv.className = "message-group assistant";
            typingDiv.id = "typing-indicator";
            typingDiv.innerHTML = `
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            DOM.messagesContainer.appendChild(typingDiv);
            DOM.messagesContainer.scrollTop = DOM.messagesContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById("typing-indicator");
            if (indicator) indicator.remove();
        }

        // ============ CHAT ============
        async function sendMessage() {
            const message = DOM.chatInput.value.trim();
            if (!message || state.isLoading) return;

            state.isLoading = true;
            DOM.sendBtn.disabled = true;
            DOM.chatInput.disabled = true;
            DOM.chatInput.value = "";
            DOM.chatInput.style.height = "auto";

            // Add user message
            const userMsg = {
                role: "user",
                content: message,
                timestamp: new Date().toISOString()
            };
            state.sessions[state.currentSessionId].messages.push(userMsg);
            renderMessage(userMsg);
            showTypingIndicator();

            try {
                const session = getCurrentSession();
                const requestBody = {
                    prompt: message,
                    session_id: state.currentSessionId,
                    model: "llama3.2",
                    use_documents: session.useDocuments !== false
                };

                if (session.selectedPromptId) {
                    requestBody.prompt_id = session.selectedPromptId;
                }

                const response = await fetch(`${state.API_BASE}/chat`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) throw new Error(`API error: ${response.status}`);

                const data = await response.json();
                removeTypingIndicator();

                const assistantMsg = {
                    role: "assistant",
                    content: data.response,
                    timestamp: new Date().toISOString()
                };
                state.sessions[state.currentSessionId].messages.push(assistantMsg);
                renderMessage(assistantMsg);

            } catch (error) {
                console.error("Chat error:", error);
                removeTypingIndicator();
                showError(`Error: ${error.message}`);
            }

            state.isLoading = false;
            DOM.sendBtn.disabled = false;
            DOM.chatInput.disabled = false;
            DOM.chatInput.focus();
        }

        function showError(message) {
            const errorDiv = document.createElement("div");
            errorDiv.className = "error-message";
            errorDiv.textContent = message;
            DOM.messagesContainer.appendChild(errorDiv);
            setTimeout(() => errorDiv.remove(), 5000);
        }

        // ============ DOCUMENTS ============
        async function loadDocuments() {
            try {
                const response = await fetch(`${state.API_BASE}/documents`);
                if (response.ok) {
                    const data = await response.json();
                    state.documents = data.documents || [];
                }
            } catch (error) {
                console.error("Failed to load documents:", error);
            }
        }

        function renderDocuments() {
            // Sidebar
            DOM.documentsList.innerHTML = "";
            state.documents.forEach(doc => {
                const div = document.createElement("div");
                div.className = "doc-item";
                div.textContent = doc.source;
                div.addEventListener("click", () => selectDocument(doc.id));
                DOM.documentsList.appendChild(div);
            });

            // Right panel
            DOM.docListContainer.innerHTML = "";
            if (state.documents.length === 0) {
                const empty = document.createElement("div");
                empty.style.textAlign = "center";
                empty.style.color = "#666";
                empty.style.fontSize = "12px";
                empty.textContent = "No documents uploaded";
                DOM.docListContainer.appendChild(empty);
            } else {
                state.documents.forEach(doc => {
                    const div = document.createElement("div");
                    div.className = "doc-list-item";
                    div.innerHTML = `
                        <span class="doc-list-item-name">${escapeHtml(doc.source)}</span>
                        <button class="doc-list-item-btn" data-id="${doc.id}">Use</button>
                    `;
                    div.querySelector(".doc-list-item-btn").addEventListener("click", () => {
                        selectDocument(doc.id);
                    });
                    DOM.docListContainer.appendChild(div);
                });
            }
        }

        function selectDocument(docId) {
            state.selectedDocumentId = state.selectedDocumentId === docId ? null : docId;
            updateDocumentIndicator();
            renderDocuments();
        }

        function updateDocumentIndicator() {
            if (state.selectedDocumentId) {
                const doc = state.documents.find(d => d.id === state.selectedDocumentId);
                if (doc) {
                    const indicator = document.createElement("div");
                    indicator.className = "document-context";
                    indicator.innerHTML = `
                        <div class="document-context-title">📎 Using: ${escapeHtml(doc.source)}</div>
                        <div class="document-context-text">This document will be included in your queries</div>
                    `;
                    const existing = DOM.messagesContainer.querySelector(".document-context");
                    if (existing) existing.remove();
                    if (DOM.messagesContainer.querySelector(".empty-state")) {
                        DOM.messagesContainer.innerHTML = "";
                    }
                    DOM.messagesContainer.insertBefore(indicator, DOM.messagesContainer.firstChild);
                }
            } else {
                const existing = DOM.messagesContainer.querySelector(".document-context");
                if (existing) existing.remove();
            }
        }

        const SUPPORTED_UPLOAD_EXTENSIONS = [".txt", ".pdf", ".docx"];

        function getFileExtension(filename) {
            const dot = filename.lastIndexOf(".");
            return dot >= 0 ? filename.slice(dot).toLowerCase() : "";
        }

        async function uploadFile(file) {
            const extension = getFileExtension(file.name);
            if (!SUPPORTED_UPLOAD_EXTENSIONS.includes(extension)) {
                showError("Supported files: .txt, .pdf, .docx");
                return;
            }

            const formData = new FormData();
            formData.append("file", file);

            try {
                state.isLoading = true;
                const response = await fetch(`${state.API_BASE}/documents/upload`, {
                    method: "POST",
                    body: formData
                });

                if (!response.ok) {
                    const errorBody = await response.json().catch(() => ({}));
                    throw new Error(errorBody.detail || "Upload failed");
                }
                const data = await response.json();

                let preview = `${extension.toUpperCase()} document indexed`;
                if (extension === ".txt") {
                    preview = (await file.text()).substring(0, 500);
                }

                const newDoc = {
                    id: data.id,
                    source: file.name,
                    preview
                };
                state.documents.push(newDoc);
                renderDocuments();

                selectDocument(data.id);

            } catch (error) {
                showError(`Upload failed: ${error.message}`);
            } finally {
                state.isLoading = false;
                DOM.fileInput.value = "";
            }
        }

        // ============ PROMPTS ============
        async function loadPrompts() {
            try {
                const response = await fetch(`${state.API_BASE}/prompts`);
                if (response.ok) {
                    const data = await response.json();
                    state.prompts = data.prompts || [];
                }
            } catch (error) {
                console.error("Failed to load prompts:", error);
            }
        }

        function renderPrompts() {
            // Sidebar quick picks
            DOM.promptsList.innerHTML = "";
            state.prompts.slice(0, 3).forEach(prompt => {
                const div = document.createElement("div");
                div.className = "prompt-item";
                div.textContent = prompt.name;
                div.addEventListener("click", () => selectPromptTemplate(prompt.id));
                DOM.promptsList.appendChild(div);
            });

            // Dropdown in chat header
            const currentSelection = getCurrentSession()?.selectedPromptId || "";
            DOM.promptSelect.innerHTML = `<option value="">No prompt template</option>`;
            state.prompts.forEach(prompt => {
                const option = document.createElement("option");
                option.value = prompt.id;
                option.textContent = prompt.name;
                if (prompt.id === currentSelection) {
                    option.selected = true;
                }
                DOM.promptSelect.appendChild(option);
            });

            // Right panel library
            DOM.promptListContainer.innerHTML = "";
            state.prompts.forEach(prompt => {
                const div = document.createElement("div");
                div.className = "prompt-list-item";
                const preview = prompt.content.length > 100
                    ? `${prompt.content.substring(0, 100)}...`
                    : prompt.content;
                div.innerHTML = `
                    <div class="prompt-list-item-name">${escapeHtml(prompt.name)}</div>
                    <div class="prompt-list-item-content">${escapeHtml(preview)}</div>
                    <div class="prompt-list-item-actions">
                        <button class="prompt-action-btn" data-action="use">Use</button>
                        <button class="prompt-action-btn" data-action="edit">Edit</button>
                        <button class="prompt-action-btn" data-action="delete">Delete</button>
                    </div>
                `;

                div.querySelector('[data-action="use"]').addEventListener("click", (e) => {
                    e.stopPropagation();
                    selectPromptTemplate(prompt.id);
                });
                div.querySelector('[data-action="edit"]').addEventListener("click", (e) => {
                    e.stopPropagation();
                    editPrompt(prompt);
                });
                div.querySelector('[data-action="delete"]').addEventListener("click", (e) => {
                    e.stopPropagation();
                    deletePrompt(prompt.id);
                });

                DOM.promptListContainer.appendChild(div);
            });
        }

        function selectPromptTemplate(promptId) {
            const session = getCurrentSession();
            if (!session) return;
            session.selectedPromptId = promptId;
            DOM.promptSelect.value = promptId;
        }

        async function savePrompt() {
            const name = DOM.promptNameInput.value.trim();
            const content = DOM.promptContentInput.value.trim();
            const editId = DOM.promptContentInput.dataset.editId;
            if (!name || !content) {
                showError("Prompt name and content are required");
                return;
            }

            try {
                const response = await fetch(
                    editId ? `${state.API_BASE}/prompts/${editId}` : `${state.API_BASE}/prompts`,
                    {
                        method: editId ? "PUT" : "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ name, content })
                    }
                );
                if (!response.ok) {
                    const errorBody = await response.json().catch(() => ({}));
                    throw new Error(errorBody.detail || "Failed to save prompt");
                }

                DOM.promptNameInput.value = "";
                DOM.promptContentInput.value = "";
                delete DOM.promptContentInput.dataset.editId;
                DOM.promptSaveBtn.textContent = "Save Prompt";
                await loadPrompts();
                renderPrompts();
            } catch (error) {
                showError(`Save prompt failed: ${error.message}`);
            }
        }

        function editPrompt(prompt) {
            DOM.promptNameInput.value = prompt.name;
            DOM.promptContentInput.value = prompt.content;
            DOM.promptContentInput.dataset.editId = prompt.id;
            DOM.promptSaveBtn.textContent = "Update Prompt";
        }

        async function deletePrompt(promptId) {
            if (!confirm("Delete this prompt?")) return;

            try {
                const response = await fetch(`${state.API_BASE}/prompts/${promptId}`, {
                    method: "DELETE"
                });
                if (!response.ok) throw new Error("Failed to delete prompt");

                const session = getCurrentSession();
                if (session?.selectedPromptId === promptId) {
                    session.selectedPromptId = null;
                }

                await loadPrompts();
                renderPrompts();
                syncChatControls();
            } catch (error) {
                showError(`Delete prompt failed: ${error.message}`);
            }
        }

        function insertPrompt(prompt) {
            selectPromptTemplate(prompt.id);
            DOM.chatInput.focus();
        }

        // ============ UTILITIES ============
        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        // ============ STARTUP ============
        init();
    </script>
</body>
</html>
